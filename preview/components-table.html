<!doctype html>
<html><head><meta charset="utf-8"><title>Table</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:14px;}
.card{background:#0d1220;border:1px solid #1e2d45;border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;font-size:11px;font-weight:600;color:#4a6080;text-transform:uppercase;letter-spacing:.07em;padding:10px 14px;border-bottom:1px solid #1e2d45;}
tbody tr{border-bottom:1px solid #1e2d45;}
tbody tr:hover{background:#111827;}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:11px 14px;}
.badge{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;}
.b-red{background:#ef444418;color:#ef4444;border:1px solid #ef444430;}
.b-amber{background:#f59e0b18;color:#f59e0b;border:1px solid #f59e0b30;}
.b-green{background:#10b98118;color:#10b981;border:1px solid #10b98130;}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:#3b82f6;}
</style></head>
<body>
<div class="wrap"><div class="card"><table>
<thead><tr><th>Risk</th><th>Severity</th><th>NIST</th><th>Status</th></tr></thead>
<tbody>
<tr><td>Unpatched external asset</td><td><span class="badge b-red">Critical</span></td><td><span class="mono">PR.PS-02</span></td><td><span class="badge b-amber">In Treatment</span></td></tr>
<tr><td>Stale privileged accounts</td><td><span class="badge b-amber">High</span></td><td><span class="mono">PR.AA-05</span></td><td><span class="badge b-red">Open</span></td></tr>
<tr><td>Missing DLP policy</td><td><span class="badge b-green">Medium</span></td><td><span class="mono">PR.DS-01</span></td><td><span class="badge b-green">Resolved</span></td></tr>
</tbody></table></div></div>
</body></html>
