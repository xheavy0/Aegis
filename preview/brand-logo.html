<!doctype html>
<html><head><meta charset="utf-8"><title>Logo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:22px;display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
.tile{display:flex;align-items:center;gap:12px;}
.mark{background:#0d1220;border:1px solid #1e2d45;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.big{width:72px;height:72px;border-radius:16px;}
.md{width:44px;height:44px;border-radius:10px;}
.sm{width:34px;height:34px;border-radius:8px;}
.nm{font-size:17px;font-weight:700;letter-spacing:-.35px;}
.nm.big{font-size:26px;font-weight:800;letter-spacing:-.9px;background:none;border:none;width:auto;height:auto;}
.sub{font-size:10px;color:#4a6080;letter-spacing:.14em;text-transform:uppercase;margin-top:2px;font-weight:600;}
.sub.big{font-size:11px;letter-spacing:.18em;margin-top:4px;}
</style></head>
<body>
<div class="wrap">
  <!-- Primary lockup: geometric hex shield mark -->
  <div class="tile">
    <div class="mark big">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
        <defs>
          <linearGradient id="gA" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <path d="M24 4 L40 13 L40 30 L24 44 L8 30 L8 13 Z" fill="url(#gA)" opacity=".18"/>
        <path d="M24 4 L40 13 L40 30 L24 44 L8 30 L8 13 Z" stroke="url(#gA)" stroke-width="2" stroke-linejoin="round" fill="none"/>
        <path d="M16 20 L24 16 L32 20 L32 28 L24 34 L16 28 Z" fill="url(#gA)" opacity=".55"/>
        <path d="M20 24 L23 27 L29 20" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div class="nm big">Aegis<span style="background:linear-gradient(90deg,#3b82f6,#06b6d4);-webkit-background-clip:text;color:transparent;">.</span></div>
      <div class="sub big">Governance · Risk · Compliance</div>
    </div>
  </div>

  <!-- Medium lockup -->
  <div class="tile">
    <div class="mark md">
      <svg width="26" height="26" viewBox="0 0 48 48" fill="none">
        <path d="M24 4 L40 13 L40 30 L24 44 L8 30 L8 13 Z" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round" fill="#3b82f620"/>
        <path d="M16 20 L24 16 L32 20 L32 28 L24 34 L16 28 Z" fill="#06b6d4" opacity=".7"/>
        <path d="M20 24 L23 27 L29 20" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div class="nm">Aegis<span style="color:#06b6d4;">.</span></div>
      <div class="sub">GRC Platform</div>
    </div>
  </div>

  <!-- Icon mark only -->
  <div class="tile">
    <div class="mark sm">
      <svg width="20" height="20" viewBox="0 0 48 48" fill="none">
        <path d="M24 4 L40 13 L40 30 L24 44 L8 30 L8 13 Z" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round" fill="#3b82f630"/>
        <path d="M20 24 L23 27 L29 20" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>

  <!-- Monochrome variant -->
  <div class="tile">
    <div class="mark md" style="background:#fff;">
      <svg width="26" height="26" viewBox="0 0 48 48" fill="none">
        <path d="M24 4 L40 13 L40 30 L24 44 L8 30 L8 13 Z" stroke="#080c14" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
        <path d="M16 20 L24 16 L32 20 L32 28 L24 34 L16 28 Z" fill="#080c14" opacity=".15"/>
        <path d="M20 24 L23 27 L29 20" stroke="#080c14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div class="nm" style="color:#e8edf5;">Aegis<span style="color:#e8edf5;">.</span></div>
      <div class="sub">Mono variant</div>
    </div>
  </div>
</div>
</body></html>
