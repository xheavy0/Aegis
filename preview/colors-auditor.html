<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Auditor Mode</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:18px;}
.banner{background:linear-gradient(90deg,#92400e,#b45309);padding:8px 16px;font-size:12px;font-weight:600;letter-spacing:.04em;color:#fef3c7;display:flex;align-items:center;gap:10px;border-radius:8px;margin-bottom:14px;}
.badge{background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.sw{border-radius:8px;padding:10px;height:76px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid #92400e;}
.nm{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fef3c7;}
.hex{font-family:'JetBrains Mono',monospace;font-size:10px;color:#fef3c7;opacity:.75;}
</style></head>
<body>
<div class="wrap">
  <div class="banner"><span>👁️</span><span class="badge">AUDITOR MODE</span><span>Read-only · restricted visibility · watermarked exports</span></div>
  <div class="grid">
    <div class="sw" style="background:#0f0800"><div class="nm">Surface</div><div class="hex">#0f0800</div></div>
    <div class="sw" style="background:#1a0a00"><div class="nm">Topbar</div><div class="hex">#1a0a00</div></div>
    <div class="sw" style="background:#92400e"><div class="nm">Line</div><div class="hex">#92400e</div></div>
    <div class="sw" style="background:#b45309"><div class="nm">Accent</div><div class="hex">#b45309</div></div>
  </div>
</div>
</body></html>
