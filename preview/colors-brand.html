<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Brand & Gradients</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:18px;display:grid;grid-template-columns:140px 1fr 1fr;gap:12px;}
.big{border-radius:14px;padding:14px;height:150px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid #1e2d45;}
.big .nm{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#fff;}
.big .hex{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.75);}
.grad{border-radius:12px;padding:12px;height:150px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;border:1px solid #1e2d45;}
.grad .nm{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.grad .lbl{font-size:11px;opacity:.8;}
</style></head>
<body>
<div class="wrap">
  <div class="big" style="background:#3b82f6"><div class="nm">Accent</div><div class="hex">#3b82f6</div></div>
  <div class="grad" style="background:linear-gradient(135deg,#3b82f6,#06b6d4)"><div class="nm">Brand Gradient</div><div class="lbl">logo · hero · avatar<br>#3b82f6 → #06b6d4</div></div>
  <div class="grad" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6)"><div class="nm">User Avatar</div><div class="lbl">sidebar user · chips<br>#3b82f6 → #8b5cf6</div></div>
</div>
</body></html>
