<!doctype html>
<html><head><meta charset="utf-8"><title>Stat Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.stat-card{background:#0d1220;border:1px solid #1e2d45;border-radius:12px;padding:20px;position:relative;overflow:hidden;text-align:center;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.blue::after{background:linear-gradient(90deg,#3b82f6,#06b6d4);}
.stat-card.red::after{background:linear-gradient(90deg,#ef4444,#f97316);}
.stat-card.green::after{background:linear-gradient(90deg,#10b981,#06b6d4);}
.stat-card.amber::after{background:linear-gradient(90deg,#f59e0b,#f97316);}
.stat-ico{font-size:22px;margin-bottom:4px;}
.stat-num{font-size:32px;font-weight:700;letter-spacing:-1px;line-height:1;}
.stat-label{font-size:12px;color:#4a6080;margin-top:6px;}
.glow-blue{color:#3b82f6;text-shadow:0 0 20px #3b82f640;}
.glow-red{color:#ef4444;text-shadow:0 0 20px #ef444440;}
.glow-green{color:#10b981;text-shadow:0 0 20px #10b98140;}
.glow-amber{color:#f59e0b;text-shadow:0 0 20px #f59e0b40;}
</style></head>
<body>
<div class="wrap">
  <div class="stat-card blue"><div class="stat-ico">⚠️</div><div class="stat-num glow-blue">23</div><div class="stat-label">Active Risks</div></div>
  <div class="stat-card red"><div class="stat-ico">🔍</div><div class="stat-num glow-red">7</div><div class="stat-label">Open Findings</div></div>
  <div class="stat-card green"><div class="stat-ico">📋</div><div class="stat-num glow-green">142</div><div class="stat-label">Evidence Items</div></div>
  <div class="stat-card amber"><div class="stat-ico">🔌</div><div class="stat-num glow-amber">9</div><div class="stat-label">Plugins</div></div>
</div>
</body></html>
