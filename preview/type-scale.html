<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Scale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:18px 20px;display:flex;flex-direction:column;gap:6px;}
.row{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid #1e2d45;padding-bottom:6px;}
.row:last-child{border:none;}
.tok{font-family:'JetBrains Mono',monospace;font-size:10px;color:#4a6080;width:80px;flex-shrink:0;letter-spacing:.04em;}
.ex{color:#e8edf5;}
.meta{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:#4a6080;}
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="tok">hero-num</span><span class="ex" style="font-size:40px;font-weight:800;letter-spacing:-1.6px;color:#3b82f6;text-shadow:0 0 20px #3b82f640">98</span><span class="meta">52/800/-2</span></div>
  <div class="row"><span class="tok">stat-num</span><span class="ex" style="font-size:28px;font-weight:700;letter-spacing:-0.8px">142</span><span class="meta">36/700/-1</span></div>
  <div class="row"><span class="tok">h1</span><span class="ex" style="font-size:22px;font-weight:700;letter-spacing:-0.4px">Risk Register</span><span class="meta">24/700/-.4</span></div>
  <div class="row"><span class="tok">h3</span><span class="ex" style="font-size:16px;font-weight:700;letter-spacing:-0.4px">Aegis</span><span class="meta">17/700</span></div>
  <div class="row"><span class="tok">body</span><span class="ex" style="font-size:13px">Identify, assess, and track organizational risks</span><span class="meta">13/400</span></div>
  <div class="row"><span class="tok">sub</span><span class="ex" style="font-size:12px;color:#4a6080">Last updated 4m ago · 142 controls</span><span class="meta">12/400</span></div>
  <div class="row"><span class="tok">label</span><span class="ex" style="font-size:11px;font-weight:600;letter-spacing:.1em;color:#4a6080;text-transform:uppercase">Quick Actions</span><span class="meta">11/600/.1</span></div>
</div>
</body></html>
