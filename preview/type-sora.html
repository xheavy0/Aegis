<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Sora Specimen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:22px 20px;}
.big{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:4px;}
.sub{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#06b6d4;font-weight:700;margin-bottom:12px;}
.sample{display:flex;align-items:baseline;gap:14px;color:#8fa3bf;font-size:12px;border-top:1px solid #1e2d45;padding-top:8px;}
.w{display:flex;flex-direction:column;gap:2px;align-items:flex-start}
.w .n{font-size:22px;color:#e8edf5;}
.w .m{font-size:10px;color:#4a6080;letter-spacing:.06em;text-transform:uppercase;}
</style></head>
<body>
<div class="wrap">
  <div class="sub">Primary Typeface</div>
  <div class="big">Sora</div>
  <div class="sample">
    <div class="w"><span class="n" style="font-weight:300">Aa</span><span class="m">300 Light</span></div>
    <div class="w"><span class="n" style="font-weight:400">Aa</span><span class="m">400 Regular</span></div>
    <div class="w"><span class="n" style="font-weight:500">Aa</span><span class="m">500 Medium</span></div>
    <div class="w"><span class="n" style="font-weight:600">Aa</span><span class="m">600 Semi</span></div>
    <div class="w"><span class="n" style="font-weight:700">Aa</span><span class="m">700 Bold</span></div>
  </div>
</div>
</body></html>
