<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Mono Specimen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:22px 20px;}
.sub{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#06b6d4;font-weight:700;margin-bottom:10px;}
.big{font-family:'JetBrains Mono',monospace;font-size:42px;font-weight:500;letter-spacing:-1px;color:#e8edf5;margin-bottom:6px;}
.row{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;border-top:1px solid #1e2d45;padding-top:10px;}
.badge{font-family:'JetBrains Mono',monospace;font-size:12px;background:#3b82f618;color:#3b82f6;border:1px solid #3b82f630;padding:3px 8px;border-radius:5px;}
.ts{font-family:'JetBrains Mono',monospace;font-size:11px;color:#4a6080;}
</style></head>
<body>
<div class="wrap">
  <div class="sub">Monospace</div>
  <div class="big">JetBrains Mono</div>
  <div class="row">
    <span class="badge">PR.AA-01</span>
    <span class="badge" style="background:#10b98118;color:#10b981;border-color:#10b98130">DE.CM-01</span>
    <span class="badge" style="background:#8b5cf618;color:#8b5cf6;border-color:#8b5cf630">GV.RM-01</span>
    <span class="ts">2026-04-18 09:42:01 · UTC</span>
  </div>
</div>
</body></html>
