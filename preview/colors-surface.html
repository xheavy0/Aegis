<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Surface Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#0a0e18;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:18px;display:flex;gap:10px;align-items:stretch;}
.sw{flex:1;border-radius:10px;padding:14px 12px;display:flex;flex-direction:column;justify-content:space-between;min-height:110px;border:1px solid #1e2d45;}
.sw .hex{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8fa3bf;}
.sw .name{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#4a6080;}
.sw .val{font-size:13px;color:#e8edf5;margin-top:2px;}
</style></head>
<body>
<div class="wrap">
  <div class="sw" style="background:#080c14"><div><div class="name">bg</div><div class="val">Base</div></div><div class="hex">#080c14</div></div>
  <div class="sw" style="background:#0d1220"><div><div class="name">bg-2</div><div class="val">Panel</div></div><div class="hex">#0d1220</div></div>
  <div class="sw" style="background:#111827"><div><div class="name">bg-3</div><div class="val">Raised</div></div><div class="hex">#111827</div></div>
  <div class="sw" style="background:#1a2236"><div><div class="name">bg-4</div><div class="val">Hover</div></div><div class="hex">#1a2236</div></div>
  <div class="sw" style="background:#1f2a40"><div><div class="name">bg-5</div><div class="val">Pressed</div></div><div class="hex">#1f2a40</div></div>
</div>
</body></html>
