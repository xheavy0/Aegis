<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Semantic</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.sw{border-radius:10px;padding:12px;height:100px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid #1e2d45;color:#fff;}
.nm{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.hex{font-family:'JetBrains Mono',monospace;font-size:10px;opacity:.8;}
.use{font-size:10px;opacity:.85;}
</style></head>
<body>
<div class="wrap">
  <div class="sw" style="background:#ef4444"><div><div class="nm">Red</div><div class="use">critical · error</div></div><div class="hex">#ef4444</div></div>
  <div class="sw" style="background:#f59e0b"><div><div class="nm">Amber</div><div class="use">high · warning · auditor</div></div><div class="hex">#f59e0b</div></div>
  <div class="sw" style="background:#10b981"><div><div class="nm">Green</div><div class="use">compliant · low · success</div></div><div class="hex">#10b981</div></div>
  <div class="sw" style="background:#3b82f6"><div><div class="nm">Blue</div><div class="use">brand · info</div></div><div class="hex">#3b82f6</div></div>
  <div class="sw" style="background:#06b6d4"><div><div class="nm">Teal</div><div class="use">kickers · secondary</div></div><div class="hex">#06b6d4</div></div>
  <div class="sw" style="background:#8b5cf6"><div><div class="nm">Purple</div><div class="use">framework · officer</div></div><div class="hex">#8b5cf6</div></div>
  <div class="sw" style="background:#ec4899"><div><div class="nm">Pink</div><div class="use">gradient partner</div></div><div class="hex">#ec4899</div></div>
  <div class="sw" style="background:#f97316"><div><div class="nm">Orange</div><div class="use">gradient partner</div></div><div class="hex">#f97316</div></div>
</div>
</body></html>
