<!doctype html>
<html><head><meta charset="utf-8"><title>Forms</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:#4a6080;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.form-group input,.form-group select{
  width:100%;background:#080c14;border:1px solid #1e2d45;border-radius:8px;
  padding:9px 12px;font-size:13px;color:#e8edf5;font-family:'Sora',sans-serif;outline:none;box-sizing:border-box;
}
.form-group input:focus{border-color:#3b82f6;}
.search-bar{background:#080c14;border:1px solid #1e2d45;border-radius:8px;padding:8px 14px;font-size:13px;color:#e8edf5;font-family:'Sora',sans-serif;outline:none;width:100%;box-sizing:border-box;}
.toggle-sw{width:34px;height:18px;border-radius:9px;background:#1f2a40;border:1px solid #1e2d45;position:relative;cursor:pointer;display:inline-block;vertical-align:middle;}
.toggle-sw.on{background:#3b82f6;}
.toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .2s;}
.toggle-sw.on::after{left:18px;}
.tog{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#111827;border:1px solid #1e2d45;border-radius:8px;font-size:12px;}
</style></head>
<body>
<div class="wrap">
  <div class="form-group"><label>Risk Name</label><input value="Unpatched external asset"></div>
  <div class="form-group"><label>Severity</label><select><option>Critical</option></select></div>
  <div class="form-group" style="grid-column:1/-1"><input class="search-bar" placeholder="🔍 Search controls..."></div>
  <div class="tog"><span class="toggle-sw on"></span><span>NIST CSF 2.0 — enabled</span></div>
  <div class="tog"><span class="toggle-sw"></span><span>SOC 2 — disabled</span></div>
</div>
</body></html>
