<!doctype html>
<html><head><meta charset="utf-8"><title>Radius & Spacing</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=JetBrains+Mono:wght@500&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:18px;display:flex;gap:14px;align-items:flex-end;}
.box{background:#1a2236;border:1px solid #253550;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:8px;gap:3px;width:72px;}
.tok{font-family:'JetBrains Mono',monospace;font-size:10px;color:#4a6080;}
.val{font-size:11px;color:#e8edf5;}
</style></head>
<body>
<div class="wrap">
  <div class="box" style="height:54px;border-radius:5px"><div class="tok">5</div><div class="val">badge</div></div>
  <div class="box" style="height:66px;border-radius:6px"><div class="tok">6</div><div class="val">cell</div></div>
  <div class="box" style="height:78px;border-radius:8px"><div class="tok">8</div><div class="val">btn/input</div></div>
  <div class="box" style="height:94px;border-radius:10px"><div class="tok">10</div><div class="val">rule</div></div>
  <div class="box" style="height:110px;border-radius:12px"><div class="tok">12</div><div class="val">card</div></div>
  <div class="box" style="height:124px;border-radius:16px"><div class="tok">16</div><div class="val">modal</div></div>
  <div class="box" style="height:138px;border-radius:999px"><div class="tok">pill</div><div class="val">chip</div></div>
</div>
</body></html>
