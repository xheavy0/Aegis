<!doctype html>
<html><head><meta charset="utf-8"><title>Elevation & Glow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.panel{background:#0d1220;border:1px solid #1e2d45;border-radius:12px;padding:18px;text-align:center;}
.lbl{font-size:10px;color:#4a6080;text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-top:8px;}
.num{font-size:40px;font-weight:800;letter-spacing:-1.5px;}
.modal{box-shadow:0 8px 32px rgba(0,0,0,.5);background:#0d1220;border:1px solid #253550;border-radius:14px;padding:16px;}
.dot{width:10px;height:10px;border-radius:50%;background:#10b981;box-shadow:0 0 8px #10b981;display:inline-block;margin-right:6px;}
</style></head>
<body>
<div class="wrap">
  <div class="panel"><div class="num" style="color:#3b82f6;text-shadow:0 0 20px #3b82f640">98%</div><div class="lbl">Glow · Blue</div></div>
  <div class="panel"><div class="num" style="color:#ef4444;text-shadow:0 0 20px #ef444440">12</div><div class="lbl">Glow · Red</div></div>
  <div class="panel"><div class="num" style="color:#f59e0b;text-shadow:0 0 20px #f59e0b40">7</div><div class="lbl">Glow · Amber</div></div>
  <div class="modal" style="grid-column:1/-1"><div style="font-size:13px"><span class="dot"></span>Modal elevation — 0 8px 32px rgba(0,0,0,.5)</div></div>
</div>
</body></html>
