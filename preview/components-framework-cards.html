<!doctype html>
<html><head><meta charset="utf-8"><title>Framework Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;700&display=swap');
html,body{margin:0;background:#080c14;font-family:'Sora',sans-serif;color:#e8edf5;}
.wrap{padding:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.fw{background:#0d1220;border:1px solid #1e2d45;border-radius:12px;padding:16px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:8px;}
.fw::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.fw.nist::before{background:linear-gradient(90deg,#3b82f6,#06b6d4);}
.fw.iso::before{background:linear-gradient(90deg,#8b5cf6,#ec4899);}
.fw.soc::before{background:linear-gradient(90deg,#10b981,#06b6d4);}
.fw.gdpr::before{background:linear-gradient(90deg,#f59e0b,#ef4444);}
.fw.pci::before{background:linear-gradient(90deg,#ef4444,#f97316);}
.fw.cis::before{background:linear-gradient(90deg,#06b6d4,#8b5cf6);}
.row{display:flex;align-items:center;gap:10px;}
.ico{font-size:24px;}
.nm{font-size:13px;font-weight:700;}
.desc{font-size:11px;color:#4a6080;line-height:1.5;}
.pct{font-size:20px;font-weight:700;color:#3b82f6;margin-top:auto;}
.tog{width:34px;height:18px;border-radius:9px;background:#1f2a40;position:relative;margin-left:auto;}
.tog.on{background:#3b82f6;}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;}
.tog.on::after{left:18px;}
</style></head>
<body>
<div class="wrap">
  <div class="fw nist"><div class="row"><span class="ico">🛡️</span><span class="nm">NIST CSF 2.0</span><span class="tog on"></span></div><div class="desc">Cybersecurity framework with Govern, Identify, Protect, Detect, Respond, Recover.</div><div class="pct">76%</div></div>
  <div class="fw iso"><div class="row"><span class="ico">🔐</span><span class="nm">ISO 27001</span><span class="tog on"></span></div><div class="desc">Annex A controls across organizational, people, physical, technological domains.</div><div class="pct" style="color:#8b5cf6">58%</div></div>
  <div class="fw soc"><div class="row"><span class="ico">✅</span><span class="nm">SOC 2</span><span class="tog"></span></div><div class="desc">Trust services criteria — Security, Availability, Confidentiality.</div><div class="pct" style="color:#10b981">—</div></div>
</div>
</body></html>
